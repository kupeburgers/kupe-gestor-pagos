<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pagos - Kupe</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        .login-card h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #333;
        }

        .login-card p {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .user-buttons {
            display: flex;
            gap: 20px;
        }

        .user-btn {
            flex: 1;
            padding: 50px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 28px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .user-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(102, 126, 234, 0.3);
        }

        .user-btn span {
            display: block;
            font-size: 16px;
            margin-top: 10px;
        }

        .app-screen {
            display: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .header-left .subtitle {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        .rule-box {
            background: #fee;
            border-left: 4px solid #d32f2f;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: 600;
            color: #d32f2f;
            font-size: 18px;
            text-align: center;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #5568d3;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .alert-urgent {
            background: #ffebee;
            border: 1px solid #d32f2f;
            color: #d32f2f;
        }

        .alert-warning {
            background: #fff3e0;
            border: 1px solid #f57c00;
            color: #f57c00;
        }

        .alert-info {
            background: #e3f2fd;
            border: 1px solid #1976d2;
            color: #1976d2;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .summary-card.warning {
            background: linear-gradient(135deg, #f57c00 0%, #e65100 100%);
        }

        .summary-card.success {
            background: linear-gradient(135deg, #388e3c 0%, #1b5e20 100%);
        }

        .summary-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 700;
        }

        .payments-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .payment-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 10px;
        }

        .payment-item.pending {
            border-left: 4px solid #f57c00;
            background: #fffaf0;
        }

        .payment-item.overdue {
            border-left: 4px solid #d32f2f;
            background: #ffebee;
        }

        .payment-item.paid {
            border-left: 4px solid #388e3c;
            background: #f1f8f4;
            opacity: 0.8;
        }

        .payment-info {
            flex: 1;
        }

        .payment-provider {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .payment-date {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }

        .payment-amount {
            text-align: right;
        }

        .amount {
            font-weight: 700;
            font-size: 16px;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .status-overdue {
            background: #ffcdd2;
            color: #d32f2f;
        }

        .status-paid {
            background: #c8e6c9;
            color: #388e3c;
        }

        .actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-small {
            padding: 6px 10px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .btn-small:hover {
            background: #5568d3;
        }

        .btn-edit {
            background: #ff9800;
        }

        .btn-edit:hover {
            background: #f57c00;
        }

        .btn-delete {
            background: #f44336;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
    </style>
</head>
<body>
    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1>💰 Gestor de Pagos</h1>
            <p>¿Quién sos?</p>
            <div class="user-buttons">
                <button class="user-btn" onclick="selectUser('rochi')">
                    👨 Rochi
                </button>
                <button class="user-btn" onclick="selectUser('pato')">
                    🧑 Pato
                </button>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE APP -->
    <div id="app-screen" class="app-screen">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <h1>💰 Gestor de Pagos - <span id="user-name">Kupe</span></h1>
                    <p class="subtitle">Organización de pagos en tiempo real</p>
                </div>
                <button class="logout-btn" onclick="logout()">Salir</button>
            </div>

            <div class="rule-box">
                ⚠️ Ningún pago o compromiso nuevo puede quedar solo en la cabeza de Rochi. Si lo pacta, lo carga.
            </div>

            <div class="summary" id="summary"></div>

            <div class="content">
                <div class="card">
                    <h2>➕ Cargar Nuevo Pago</h2>

                    <div class="form-group">
                        <label>Proveedor / Concepto</label>
                        <input type="text" id="provider" placeholder="Ej: Proveedor XYZ, Préstamo Personal, etc.">
                    </div>

                    <div class="form-group">
                        <label>Monto a pagar ($)</label>
                        <input type="number" id="amount" placeholder="0" step="1000">
                    </div>

                    <div class="form-group">
                        <label>Fecha de pago pactada</label>
                        <input type="date" id="date">
                    </div>

                    <div class="form-group">
                        <label>Notas (opcional)</label>
                        <input type="text" id="notes" placeholder="Ej: Pago cuando hay ventas, cada 7 días, etc.">
                    </div>

                    <button onclick="addPayment()">Guardar Pago</button>
                    <div class="sync-status" id="sync-status"></div>
                </div>

                <div class="card">
                    <h2>⚡ Alertas Importantes</h2>
                    <div id="alerts-container"></div>
                </div>
            </div>

            <div class="card">
                <h2>📋 Listado de Pagos</h2>

                <div class="tabs">
                    <button class="tab active" onclick="filterPayments('pending')">Pendientes</button>
                    <button class="tab" onclick="filterPayments('paid')">Pagados</button>
                    <button class="tab" onclick="filterPayments('all')">Todos</button>
                </div>

                <div id="payments-container" class="payments-list"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lqpzhzworncmcuptesjh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxcHpoendvcm5jbWN1cHRlc2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDI2NDYsImV4cCI6MjA4OTUxODY0Nn0.sa4SrtesQLLpP898P4zKUGeYbbILxQ2PUoaOy-dXFjI';

        let supabase = null;

        let currentUser = null;
        let payments = [];
        let refreshInterval = null;

        function initSupabase() {
            if (window.supabase && !supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        }

        function selectUser(user) {
            currentUser = user;
            localStorage.setItem('selectedUser', user);
            showApp();
            loadPayments();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('selectedUser');
            if (refreshInterval) clearInterval(refreshInterval);
            showLogin();
        }

        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-name').textContent = currentUser.charAt(0).toUpperCase() + currentUser.slice(1);
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        function showLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }

        async function loadPayments() {
            if (!currentUser) return;

            const { data, error } = await supabase
                .from('payments')
                .select('*')
                .order('payment_date', { ascending: true });

            if (error) {
                console.error('Error cargando pagos:', error);
                return;
            }

            payments = data || [];
            renderPayments();
            updateSummary();
            showAlerts();
        }


        async function addPayment() {
            if (!currentUser) return;

            const provider = document.getElementById('provider').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const notes = document.getElementById('notes').value.trim();

            if (!provider || !amount || !date) {
                alert('Completá: Proveedor, Monto y Fecha');
                return;
            }

            showSync('Guardando...');

            const { error } = await supabase
                .from('payments')
                .insert([{
                    provider,
                    amount,
                    payment_date: date,
                    notes,
                    paid: false
                }]);

            if (error) {
                alert('Error: ' + error.message);
                showSync('Error al guardar');
                return;
            }

            document.getElementById('provider').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('date').value = '';
            document.getElementById('notes').value = '';

            showSync('✅ Guardado');
            await loadPayments();
        }

        async function togglePaymentStatus(id) {
            const payment = payments.find(p => p.id === id);
            if (!payment) return;

            showSync('Actualizando...');

            const { error } = await supabase
                .from('payments')
                .update({ paid: !payment.paid })
                .eq('id', id);

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            await loadPayments();
            showSync('✅ Actualizado');
        }

        async function editPayment(id) {
            const payment = payments.find(p => p.id === id);
            if (!payment) return;

            const newProvider = prompt('Proveedor:', payment.provider);
            if (newProvider === null) return;

            const newAmount = prompt('Monto:', payment.amount);
            if (newAmount === null) return;

            const newDate = prompt('Fecha (YYYY-MM-DD):', payment.payment_date);
            if (newDate === null) return;

            const newNotes = prompt('Notas:', payment.notes || '');
            if (newNotes === null) return;

            showSync('Guardando cambios...');

            const { error } = await supabase
                .from('payments')
                .update({
                    provider: newProvider,
                    amount: parseFloat(newAmount),
                    payment_date: newDate,
                    notes: newNotes
                })
                .eq('id', id);

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            await loadPayments();
            showSync('✅ Editado');
        }

        async function deletePayment(id) {
            if (!confirm('¿Borrar este pago?')) return;

            const payment = payments.find(p => p.id === id);
            if (!payment) return;

            showSync('Borrando...');

            const { error } = await supabase
                .from('payments')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            await loadPayments();
            showSync('✅ Eliminado');
        }

        function showSync(msg) {
            document.getElementById('sync-status').textContent = msg;
            setTimeout(() => {
                document.getElementById('sync-status').textContent = '';
            }, 2000);
        }

        function getStatusClass(date, paid) {
            if (paid) return 'paid';
            const paymentDate = new Date(date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            paymentDate.setHours(0, 0, 0, 0);
            return paymentDate < today ? 'overdue' : 'pending';
        }

        function getStatusBadge(date, paid) {
            if (paid) return '<span class="status-badge status-paid">✓ Pagado</span>';
            const paymentDate = new Date(date);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            paymentDate.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((paymentDate - today) / (1000 * 60 * 60 * 24));
            if (diffDays < 0) return '<span class="status-badge status-overdue">⚠️ VENCIDO</span>';
            if (diffDays === 0) return '<span class="status-badge status-overdue">🔴 PAGA HOY</span>';
            return '<span class="status-badge status-overdue">🟡 ' + diffDays + ' días</span>';
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('es-AR', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }

        function formatAmount(amount) {
            return '$' + parseFloat(amount).toLocaleString('es-AR', { maximumFractionDigits: 0 });
        }

        function filterPayments(filter) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            let filtered = payments;
            if (filter === 'pending') {
                filtered = payments.filter(p => !p.paid);
            } else if (filter === 'paid') {
                filtered = payments.filter(p => p.paid);
            }
            renderPaymentsList(filtered);
        }

        function renderPayments() {
            renderPaymentsList(payments.filter(p => !p.paid));
        }

        function renderPaymentsList(list) {
            const container = document.getElementById('payments-container');
            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📭 No hay pagos en esta vista</p></div>';
                return;
            }
            const sorted = [...list].sort((a, b) => new Date(a.payment_date) - new Date(b.payment_date));
            container.innerHTML = sorted.map(payment => {
                const statusClass = getStatusClass(payment.payment_date, payment.paid);
                return `
                    <div class="payment-item ${statusClass}">
                        <div class="payment-info">
                            <div class="payment-provider">${payment.provider}</div>
                            <div class="payment-date">${formatDate(payment.payment_date)}</div>
                            ${payment.notes ? '<div class="payment-date" style="color: #999; font-size: 12px; margin-top: 6px;">📝 ' + payment.notes + '</div>' : ''}
                        </div>
                        <div class="payment-amount">
                            <div class="amount">${formatAmount(payment.amount)}</div>
                            ${getStatusBadge(payment.payment_date, payment.paid)}
                            <div class="actions">
                                <button class="btn-small" onclick="togglePaymentStatus(${payment.id})">${payment.paid ? '✓ Pagado' : '🔲 Pagar'}</button>
                                <button class="btn-small btn-edit" onclick="editPayment(${payment.id})">✏️</button>
                                <button class="btn-small btn-delete" onclick="deletePayment(${payment.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateSummary() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const pending = payments.filter(p => !p.paid);
            const overdue = pending.filter(p => {
                const paymentDate = new Date(p.payment_date);
                paymentDate.setHours(0, 0, 0, 0);
                return paymentDate < today;
            });
            const thisWeek = pending.filter(p => {
                const paymentDate = new Date(p.payment_date);
                paymentDate.setHours(0, 0, 0, 0);
                const weekEnd = new Date(today);
                weekEnd.setDate(weekEnd.getDate() + 7);
                return paymentDate >= today && paymentDate <= weekEnd;
            });
            const paid = payments.filter(p => p.paid);
            const summary = `
                <div class="summary-card warning">
                    <div class="summary-label">🚨 Vencidos</div>
                    <div class="summary-value">${overdue.length}</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">📅 Esta Semana</div>
                    <div class="summary-value">${thisWeek.length}</div>
                </div>
                <div class="summary-card success">
                    <div class="summary-label">✓ Pagados</div>
                    <div class="summary-value">${paid.length}</div>
                </div>
            `;
            document.getElementById('summary').innerHTML = summary;
        }

        function showAlerts() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const alerts = [];
            const overdue = payments.filter(p => !p.paid && new Date(p.payment_date) < today);
            if (overdue.length > 0) {
                alerts.push({
                    type: 'urgent',
                    message: `<strong>${overdue.length} pagos VENCIDOS</strong>. Acción inmediata.`
                });
            }
            const todayPayments = payments.filter(p => !p.paid && new Date(p.payment_date).getTime() === today.getTime());
            if (todayPayments.length > 0) {
                alerts.push({
                    type: 'urgent',
                    message: `<strong>${todayPayments.length} pagos vencen HOY</strong>.`
                });
            }
            if (alerts.length === 0) {
                alerts.push({
                    type: 'info',
                    message: '✅ Sin vencimientos urgentes.'
                });
            }
            const container = document.getElementById('alerts-container');
            container.innerHTML = alerts.map(alert => `
                <div class="alert alert-${alert.type}">
                    <span>${alert.message}</span>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSupabase();
            const savedUser = localStorage.getItem('selectedUser');
            if (savedUser) {
                currentUser = savedUser;
                showApp();
                loadPayments();
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(loadPayments, 5000);
            } else {
                showLogin();
            }
        });
    </script>
</body>
</html>
